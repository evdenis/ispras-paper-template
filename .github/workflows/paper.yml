name: Build Paper

on:
  push:
    branches: [ master ]
    paths:
      - 'paper.md'
      - 'bibliography.bib'
      - '.github/workflows/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'paper.md'
      - 'bibliography.bib'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install pandoc
      uses: pandoc/actions/setup@v1

    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: proceedings-md/node_modules
        key: ${{ runner.os }}-deps-${{ hashFiles('proceedings-md/package-lock.json') }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install npm dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        cd proceedings-md
        npm install

    - name: Build converter
      run: |
        cd proceedings-md
        npm run build

    - name: Lint markdown
      continue-on-error: true
      run: npx markdownlint-cli2 paper.md

    - name: Install hunspell
      run: sudo apt-get install -y hunspell hunspell-en-us hunspell-ru

    - name: Spell check
      continue-on-error: true
      run: make spell

    - name: Check links
      continue-on-error: true
      run: npx markdown-link-check paper.md --config .markdown-link-check.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache LanguageTool
      id: cache-lt
      uses: actions/cache@v4
      with:
        path: LanguageTool-*
        key: languagetool-stable

    - name: Install LanguageTool
      if: steps.cache-lt.outputs.cache-hit != 'true'
      run: |
        curl -L https://languagetool.org/download/LanguageTool-stable.zip -o lt.zip
        unzip -q lt.zip
        rm lt.zip

    - name: Grammar check
      continue-on-error: true
      run: make grammar LANGUAGETOOL_JAR="$(ls LanguageTool-*/languagetool-commandline.jar)"

    - name: Build paper.docx
      env:
        PROCEEDINGS_MD: ./proceedings-md/src/main.js
      run: make build

    - name: Install LibreOffice
      run: sudo apt-get install -y libreoffice

    - name: Build paper.pdf
      run: make pdf

    - name: Upload paper as artifact
      uses: actions/upload-artifact@v7
      with:
        name: paper
        path: |
          paper.docx
          paper.pdf
        retention-days: 7

